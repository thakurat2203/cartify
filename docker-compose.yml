services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - cartify_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./server
    image: cartify-server:compose
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ecommerce
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy

  seed:
    build:
      context: ./server
    image: cartify-server:compose
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/ecommerce
      CLIENT_URL: http://localhost:3000
    command: npm run seed
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
      backend:
        condition: service_started

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    image: cartify-client:compose
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cartify_mongo_data:
